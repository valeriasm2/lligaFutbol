{% extends 'lliga/base.html' %}
{% block titol %}Inici{% endblock %}
{% block content %}
<h2 class="mb-4">Lligues disponibles</h2>
{% for lliga in lligues %}
<div class="card mb-3 shadow-sm">
  <div class="card-body d-flex justify-content-between align-items-center">
    <h5 class="mb-0">{{ lliga }}</h5>
    <div>
      <a href="{% url 'lliga:partits' lliga.id %}" class="btn btn-primary btn-sm">Partits</a>
      <a href="{% url 'lliga:classificacio' lliga.id %}" class="btn btn-success btn-sm">Classificació</a>
      <a href="{% url 'lliga:pichichi' lliga.id %}" class="btn btn-warning btn-sm">Pichichi</a>
    </div>
  </div>
</div>
{% empty %}
<p>No hi ha lligues encara. <a href="/admin">Afegeix-ne des de l'admin</a>.</p>
{% endfor %}
{% endblock %}
